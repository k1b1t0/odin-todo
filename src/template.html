<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList</title>
</head>
<body>
    <nav id="sidebar">
        <h2 id="home">My Todo List</h2>
        <h2 id="projects">Projects</h2>
        <h2 id="add-project">Add Project</h2>
        <h2 id="add-todo">Add Todo</h2>
    </nav>
    <div class="content">
        <div class="todo-div">
            <h1>Project A</h1>
            <div class="todo-undone">
                <input type="checkbox" id="a1" name="a1" value="a1">
                <label for="a1">A1 task</label>
                <p>date</p>
            </div>
            <div class="todo-done">
                <input type="checkbox" id="a2" name="a2" value="a2">
                <label for="a2">A2 task</label>
            </div>
        </div>
    </div>
    <dialog id="project-modal">
        <form method="dialog" id="project-form">
            <h3>New Project</h3>
            <input type="text" name="projectName" required placeholder="name..." autofocus>
            <div class="btns">
                <button type="button" id="close-project-modal">Cancel</button>
                <button type="submit">Create</button>
            </div>
        </form>
    </dialog>
    <dialog id="todo-modal">
        <form method="dialog" id="todo-form">
            <h3>New Todo</h3>

            <label for="todo-title">Title:</label>
            <input type="text" name="title" id="todo-title" required>

            <label for="todo-desc">Description:</label>
            <input type="text" name="desciption" id="todo-desc">

            <label for="todo-due">Due date:</label>
            <input type="date" name="due" id="todo-due">

            <div>
            <label for="todo-mark">Done?:</label>
            <input type="checkbox" name="mark" id="todo-mark">
            </div>

            <label for="todo-priority">Priority</label>
            <select name="priority" id="todo-priority">
                <option>1</option>
                <option>2</option>
                <option>3</option>
            </select>

            <label for="todo-project">Project:</label>
            <select name="project" id="todo-project" required></select>
            
            <div class="btns">
                <button type="button" id="close-todo-modal">Cancel</button>
                <button type="submit">Create</button>
            </div>
        </form>
    </dialog>
</body>
</html>
